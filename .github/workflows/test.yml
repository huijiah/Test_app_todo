name: 接口自动化测试

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取测试项目代码
      - name: 拉取测试代码
        uses: actions/checkout@v3

      # 2. 拉取原项目（被测系统）源码
      - name: 拉取原项目源码
        uses: actions/checkout@v3
        with:
          repository: huijiah/To-Do-App
          path: To-Do-App

      # 3. 安装 Python 与测试依赖
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装测试依赖
        run: |
          pip install -r requirements.txt
          pip install pytest allure-pytest

      # 4. 启动原项目的 Docker 服务（Flask + MySQL）
      - name: 启动被测服务
        run: |
          cd To-Do-App
          docker-compose up -d
          sleep 20                    # 等待 MySQL 初始化完成
          docker-compose ps

      # 5. 运行接口测试
      - name: 运行接口测试
        run: |
          pytest tests/ -v --alluredir=allure-results

      # 6. 生成 Allure 报告
      - name: 生成 Allure 报告
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean

      # 7. 上传报告
      - name: 上传 Allure 报告
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: allure-report/